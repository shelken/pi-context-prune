name: Release to npm

# Publishes the package to npm whenever a semver tag like v1.0.0 is pushed.
# Uses npm trusted publishing via GitHub Actions OIDC; configure the trusted publisher on npmjs.com.
# `actions/setup-node` writes an auth-token placeholder to .npmrc, so we strip it before publish.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # enables npm provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "Tag version:     $TAG_VERSION"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build
        run: npm run build --if-present

      - name: Strip auth token placeholder for trusted publishing
        run: |
          npmrc="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          if [ -f "$npmrc" ]; then
            sed -i '/_authToken/d' "$npmrc"
          fi

      - name: Publish to npm with trusted publishing
        env:
          NODE_AUTH_TOKEN: ""
        run: npm publish --access public --provenance
